name: Hidralisk Lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar herramientas de lint
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck yamllint

      - name: Ejecutar lint
        run: make lint
