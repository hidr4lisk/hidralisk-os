name: Hidralisk Lint

# Manual por ahora: el lint del pipeline viejo falla y spamea en cada push. Se reactiva
# (o se reescribe) cuando el árbol de scripts se estabilice sobre el flujo bootc (ADR-001).
on:
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar herramientas de lint
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck yamllint

      - name: Ejecutar lint
        run: make lint
