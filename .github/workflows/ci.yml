name: CI

# Valida lo que rompe un build, sin buildear (eso se hace en el Laboratorio):
# la receta Vib (YAML + estructura), la sintaxis de los hooks de la ISO, y la app de
# estado. Todo offline y determinístico — sin descargar binarios externos.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validar (recipe · hooks · status)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: yamllint (recipe + workflows)
        run: |
          pip install --quiet yamllint
          yamllint -d "{extends: relaxed, rules: {line-length: disable, document-start: disable}}" \
            vib/recipe.yml .github/workflows/

      - name: Estructura de la receta Vib
        run: |
          python3 - <<'PY'
          import yaml, sys
          r = yaml.safe_load(open("vib/recipe.yml"))
          errs = []
          if not r.get("name"): errs.append("falta 'name'")
          stages = r.get("stages") or []
          if not stages: errs.append("sin stages")
          for i, st in enumerate(stages):
              if not str(st.get("base", "")).startswith("ghcr.io/"):
                  errs.append(f"stage {i}: base no es imagen ghcr.io ({st.get('base')!r})")
              mods = st.get("modules") or []
              if not mods: errs.append(f"stage {i}: sin modules")
              for m in mods:
                  if not m.get("name") or not m.get("type"):
                      errs.append(f"stage {i}: module sin name/type -> {m}")
          if errs:
              print("FAIL:"); [print("  -", e) for e in errs]; sys.exit(1)
          print(f"OK - recipe '{r['name']}' - {len(stages)} stage(s) - base {stages[0]['base']}")
          PY

      - name: sh -n (hooks de la ISO + scripts del repo)
        run: |
          # sh (dash) es el interprete real de los hooks (#!/bin/sh) y de build.sh/apt-shim;
          # el firstboot es #!/bin/bash. Validar cada uno con SU interprete.
          for f in iso/hooks/*.chroot vib/build.sh vib/sources/hidralisk/apt-shim; do
            sh -n "$f" && echo "  ok: $f"
          done
          bash -n vib/sources/hidralisk/branding/hidralisk-firstboot \
            && echo "  ok: vib/sources/hidralisk/branding/hidralisk-firstboot"

      - name: hidrafetch (compile + smoke run)
        run: |
          python3 -m py_compile vib/sources/hidralisk/status/hidrafetch
          # Corre de verdad (modo plano): sin abroot/Vanilla degrada con elegancia, pero debe
          # salir 0 y mostrar la seccion de seguridad. Atrapa regresiones de runtime (imports, etc.).
          out=$(python3 vib/sources/hidralisk/status/hidrafetch --plain --no-art)
          echo "$out" | grep -q "SEGURIDAD POR DEFECTO" \
            || { echo "FAIL: hidrafetch no mostro la seccion de seguridad"; exit 1; }
          echo "$out" | grep -q "INTEGRIDAD" \
            || { echo "FAIL: hidrafetch no mostro la seccion de integridad"; exit 1; }
          echo "hidrafetch corre y renderiza OK"
