name: SpellOS Build Pipeline

on:
  push:
    branches: [main, master]
    tags: ['v*', 'stable/*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag para el build'
        required: false
        default: ''

env:
  VERSION: ${{ github.event.inputs.version || github.ref_name || 'ci-$(date +%Y%m%d%H%M)' }}
  GPG_KEY: build@spellos.dev
  PYTHONUNBUFFERED: 1

jobs:
  validate:
    name: Quick Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make quick-test

  build:
    name: Build SpellOS ISO
    needs: validate
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            mmdebstrap ostree xorriso gnupg \
            python3-yaml python3-jsonschema \
            libarchive-tools

      - name: Setup GPG key
        run: |
          gpg --batch --quick-gen-key "$GPG_KEY" default default never 2>/dev/null
          gpg --export --armor "$GPG_KEY" > keys/verify.pub

      - name: Ejecutar pipeline
        run: make build
        env:
          VERSION: ${{ env.VERSION }}

      - name: Verificar ISO
        run: make test-vm
        env:
          QEMU_KVM: no

      - name: Firmar ISO con cosign
        if: ${{ env.COSIGN_KEY != '' }}
        run: |
          cosign sign-blob \
            --key env://COSIGN_KEY \
            --output-signature output/SpellOS-${{ env.VERSION }}.iso.sig \
            output/SpellOS-${{ env.VERSION }}.iso
          cosign attest \
            --key env://COSIGN_KEY \
            --predicate output/attestation.intoto.jsonl \
            --type slsa.dev/provenance/v1 \
            output/SpellOS-${{ env.VERSION }}.iso
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: SpellOS-${{ env.VERSION }}
          path: output/SpellOS-*.iso*
          retention-days: 30
