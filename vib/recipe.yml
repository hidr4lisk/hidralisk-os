# Hidralisk OS — receta Vib sobre la base INSTALABLE de Vanilla (`desktop`).
#
# Spike-4b: la base `core` NO es instalable por el instalador (albius): no trae `lpkg`,
# y el pre-script de initramfs `lpkg --unlock` que corre albius al desplegar FALLA
# ("panic: initramfs pre-script 'lpkg --unlock' failed"). Vanilla construye sus imágenes
# instalables (vm/desktop) SOBRE `desktop`, con el patrón:  lpkg --unlock → apt → lpkg --lock.
# Copiamos ese patrón oficial (ref: github.com/Vanilla-OS/vm-image/recipe.yml).
#
# Build (en el Laboratorio):
#   ./vib-amd64 build vib/recipe.yml          # → genera ./Containerfile
#   sudo podman build -t hidralisk-os:vib -f Containerfile .

vibversion: 1.0.7
name: Hidralisk OS
id: hidralisk-os

stages:
  - id: build
    base: ghcr.io/vanilla-os/desktop:main
    addincludes: false
    singlelayer: true
    labels:
      maintainer: HIDRA / hidr4lisk
      org.hidralisk.spike: "4b"
    args:
      DEBIAN_FRONTEND: noninteractive
    runs:
      commands:
        - echo 'APT::Install-Recommends "0";' > /etc/apt/apt.conf.d/01norecommends
    modules:
      - name: hidralisk
        type: shell
        commands:
          # base `desktop` = capa de paquetes TRABADA → destrabar para apt, retrabar al final
          - lpkg --unlock
          - apt-get update
          - apt-get install -y --no-install-recommends sudo openssh-server ufw htop ca-certificates qemu-guest-agent spice-vdagent zsh zsh-autosuggestions zsh-syntax-highlighting ptyxis starship gnome-shell-extension-dash-to-panel gnome-shell-extension-arc-menu
          # Terminal por defecto = Ptyxis ("Terminal"). La base trae 2 terminales extra (Black Box +
          # Alacritty) → sacarlos para no confundir. apt purge por si son debs; rm del .desktop garantiza
          # que desaparezcan del menú aunque el nombre del paquete no matchee.
          - apt-get remove -y --purge blackbox-terminal alacritty || true
          - rm -f /usr/share/applications/com.raggesilver.BlackBox.desktop /usr/share/applications/Alacritty.desktop
          - printf 'NAME="Hidralisk OS"\nID=hidralisk-os\nVARIANT="spike-vib"\n' > /etc/hidralisk-os-release
          # Branding: pisar el os-release (PRETTY_NAME/NAME = Hidralisk OS). Mantengo ID=vanilla
          # a propósito → abroot/vso/lpkg keyean por ese ID; cambiarlo los rompería. /etc/os-release
          # es symlink a ../usr/lib/os-release, así que pisando este cubre ambos.
          - printf 'PRETTY_NAME="Hidralisk OS"\nNAME="Hidralisk OS"\nVERSION_ID="2.0"\nVERSION="2.0 (spike-vib)"\nVERSION_CODENAME="orchid"\nID=vanilla\nID_LIKE=debian\nVARIANT="Hidralisk OS (spike-vib)"\nVARIANT_ID=hidralisk-os\nHOME_URL="https://github.com/hidr4lisk/hidralisk-os"\nSUPPORT_URL="https://github.com/hidr4lisk/hidralisk-os"\nBUG_REPORT_URL="https://github.com/hidr4lisk/hidralisk-os/issues"\n' > /usr/lib/os-release
          # Spike-5: deshabilitar el VSO First Setup (onboarding de Vanilla que, en el primer login,
          # muestra tema/apps y dispara `vso pico-init` → distrobox → contenedor `apx-vso-pico`.
          # Eso es frágil en VM (distrobox+podman rootless+--init) y NO es core de Hidralisk OS).
          # Quitando el autostart de /etc/skel, ningún usuario nuevo lo corre → login directo al escritorio.
          - rm -f /etc/skel/.config/autostart/org.vanillaos.FirstSetup.autostart.desktop
          # zsh: sin un ~/.zshrc, el primer login dispara el asistente zsh-newuser-install (menú "0/1/2/q").
          # La config real es system-wide (/etc/zsh/zshrc); este .zshrc en /etc/skel lo hereda cada usuario
          # nuevo (adduser copia /etc/skel) y evita el asistente.
          - echo '# Hidralisk OS - config de zsh system-wide en /etc/zsh/zshrc. Este archivo evita el asistente zsh-newuser-install en el primer login.' > /etc/skel/.zshrc
          # Spike-5 branding: logo Hidralisk en GDM (logos de desktop-base) y en el boot
          # (watermark de Plymouth). Variante BLANCA: el trazo negro original sería invisible
          # sobre los fondos oscuros de GDM/Plymouth. Assets en vib/sources/hidralisk/branding/.
          - cp /sources/hidralisk/branding/vanilla-logos/*.png /usr/share/desktop-base/vanilla-logos/
          - cp /sources/hidralisk/branding/logo-white.svg /usr/share/desktop-base/vanilla-logos/logo.svg
          - cp /sources/hidralisk/branding/logo-white.svg /usr/share/desktop-base/vanilla-logos/logo-text.svg
          - cp /sources/hidralisk/branding/logo-white.svg /usr/share/desktop-base/vanilla-logos/logo-text-version.svg
          - cp /sources/hidralisk/branding/watermark.png /usr/share/plymouth/themes/vanilla-bgrt/watermark.png
          # Spike-5 wallpaper: fondo Hidralisk (dragón + "Hidralisk OS") en escritorio y login.
          # Default del escritorio vía override de gschema (90_ gana sobre el 20_vanilla);
          # login GDM vía perfil dconf + db del greeter.
          - mkdir -p /usr/share/backgrounds/hidralisk /etc/dconf/db/gdm.d /etc/dconf/profile /usr/share/hidralisk
          - cp /sources/hidralisk/branding/backgrounds/hidralisk.png /usr/share/backgrounds/hidralisk/hidralisk.png
          - cp /sources/hidralisk/branding/90_hidralisk-background.gschema.override /usr/share/glib-2.0/schemas/
          - cp /sources/hidralisk/branding/gdm-profile /etc/dconf/profile/gdm
          - cp /sources/hidralisk/branding/gdm-background /etc/dconf/db/gdm.d/01-hidralisk-background
          - glib-compile-schemas /usr/share/glib-2.0/schemas/
          - dconf update
          # Spike-5: avatar de usuario por defecto = logo Hidralisk. El usuario lo crea el
          # instalador (nombre desconocido en build) → un oneshot lo setea en el 1er arranque
          # para el UID 1000. La guarda del .service evita que se repita.
          - cp /sources/hidralisk/branding/avatar.png /usr/share/hidralisk/avatar.png
          - cp /sources/hidralisk/branding/hidralisk-firstboot /usr/libexec/hidralisk-firstboot
          - chmod +x /usr/libexec/hidralisk-firstboot
          - cp /sources/hidralisk/branding/hidralisk-firstboot.service /usr/lib/systemd/system/hidralisk-firstboot.service
          - systemctl enable hidralisk-firstboot.service
          # Spike-6 shell: zsh por defecto + starship (tema Hidralisk) + Hack Nerd Font + Ptyxis.
          # Config system-wide (/etc/zsh/zshrc + /etc/starship.toml), no atada al home. El cambio
          # de shell del usuario instalado lo hace el oneshot de firstboot (UID 1000).
          - mkdir -p /usr/share/fonts/truetype/hack-nerd
          - cp /sources/hidralisk/branding/fonts/*.ttf /usr/share/fonts/truetype/hack-nerd/
          - fc-cache -f /usr/share/fonts/truetype/hack-nerd
          - cp /sources/hidralisk/branding/zshrc-system /etc/zsh/zshrc
          - cp /sources/hidralisk/branding/starship.toml /etc/starship.toml
          - sed -i 's|^SHELL=.*|SHELL=/usr/bin/zsh|' /etc/default/useradd
          - update-initramfs -u
          - systemctl enable ssh
          # App de estado propia ("super neofetch"): hidrafetch describe ESTA instalación
          # (hardware + postura de hardening + integridad ABRoot). Solo stdlib de python3
          # (ya en la base), impersonal. Se instala como comando del sistema.
          - install -Dm755 /sources/hidralisk/status/hidrafetch /usr/bin/hidrafetch
          # Spike-7 hardening: postura de seguridad POR DEFECTO (el diferenciador del SO).
          # sysctl endurecido (ver HARDENING.md, reconciliado con apx: NO se tocan
          # userns/bpf que romperían distrobox/podman). Firewall ufw default-deny incoming +
          # SSH permitido (la imagen trae openssh-server). Se evita `ufw enable` (carga reglas,
          # falla en el build): se setea ENABLED=yes + se habilita el servicio (aplica al boot).
          - cp /sources/hidralisk/hardening/99-hidra-hardening.conf /etc/sysctl.d/99-hidra-hardening.conf
          - ufw default deny incoming
          - ufw default allow outgoing
          - ufw allow 22/tcp
          - sed -i 's/^ENABLED=.*/ENABLED=yes/' /etc/ufw/ufw.conf
          - systemctl enable ufw
          # Spike-8: cazar a Vanilla de la interfaz + escritorio tipo Mint + arreglos de boot.
          # FsGuard: el chequeo de integridad al boot (010-fsguard.sh) verifica un filelist firmado
          # con la clave de Vanilla EMBEBIDA en el binario (no re-firmable para imágenes custom) →
          # nuestras modificaciones lo rompen ("Integrity Check Failed"). Se desactiva: la integridad
          # ya la dan composefs/fs-verity (root RO) + el hardening de arriba.
          - rm -f /usr/share/init.d/010-fsguard.sh
          # ABRoot apuntaba a vanilla-os/desktop (un `abroot upgrade` traería Vanilla stock) →
          # apuntarlo a NUESTRA imagen.
          - sed -i 's@vanilla-os/desktop@hidr4lisk/hidralisk-os@' /usr/share/abroot/abroot.json
          - sed -i '/"tag"/ s@main@latest@' /usr/share/abroot/abroot.json
          # Tour de Vanilla fuera. OJO: NO borrar org.vanillaos.FirstSetup.desktop -> el instalador
          # (albius) lo COPIA al autostart del usuario en postInstall; si no existe, el `cp` FALLA y
          # aborta la instalacion ANTES del chown del home (= login roto). El First Setup ("la flor")
          # se neutraliza en el 1er boot via hidralisk-firstboot (Session=gnome + saca el autostart).
          - rm -f /usr/share/applications/org.vanillaos.Tour.desktop
          # Flor de Vanilla del splash de boot (throbber animado, 31 frames 308x308) → dragón.
          - for f in /usr/share/plymouth/themes/vanilla-bgrt/throbber-*.png; do cp /sources/hidralisk/branding/desktop/dragon-throbber.png "$f"; done
          # Escritorio tipo Mint: panel arriba (Dash to Panel) + menú estilo Mint con el dragón (Arc Menu).
          - cp /sources/hidralisk/branding/desktop/menu-icon-white-256.png /usr/share/hidralisk/menu-icon.png
          - cp /sources/hidralisk/branding/desktop/95_hidralisk-desktop.gschema.override /usr/share/glib-2.0/schemas/
          - glib-compile-schemas /usr/share/glib-2.0/schemas/
          - apt-get autoremove -y
          - apt-get clean
          - lpkg --lock
