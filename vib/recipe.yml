# Hidralisk OS — Spike-3: receta Vib mínima sobre la base inmutable de Vanilla OS.
#
# Valida lo que la pared #1 del Spike-1/2 bloqueaba (ver ADR-002): instalar paquetes
# con apt sobre una base Debian inmutable real. La clave es `lpkg --unlock` (mecanismo
# de Vanilla que destraba la capa de paquetes en build) — justo lo que a bootcrew le
# faltaba. Vanilla core SÍ trae la DB de dpkg (962 paquetes, verificado).
#
# Build (en el Laboratorio):
#   ./vib-amd64 build vib/recipe.yml          # → genera ./Containerfile
#   sudo podman build -t hidralisk-os:vib -f Containerfile .
#
# Solo módulos `shell` (apt-get directo) para no depender de plugins.

vibversion: 1.0.7
name: Hidralisk OS (spike Vib)
id: hidralisk-os

stages:
  - id: build
    base: ghcr.io/vanilla-os/core:latest
    addincludes: false
    singlelayer: false
    labels:
      maintainer: HIDRA / hidr4lisk
      org.hidralisk.spike: "3"
    args:
      DEBIAN_FRONTEND: noninteractive
    runs:
      commands:
        - echo 'APT::Install-Recommends "0";' > /etc/apt/apt.conf.d/01norecommends
    modules:
      - name: paquetes-e-identidad
        type: shell
        commands:
          # En la base `core` la capa de paquetes NO está trabada → apt funciona directo
          # (lpkg --unlock/--lock solo hace falta en la imagen `desktop`).
          - apt-get update
          - apt-get install -y --no-install-recommends openssh-server ufw htop ca-certificates
          - printf 'NAME="Hidralisk OS"\nID=hidralisk-os\nVARIANT="spike-vib"\n' > /etc/hidralisk-os-release
          - apt-get autoremove -y
          - apt-get clean
