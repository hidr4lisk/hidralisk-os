# Hidralisk OS — hardening de kernel por defecto (/etc/sysctl.d/99-hidra-hardening.conf)
#
# Materializa HARDENING.md (ZeroCool, mesa 177) como config REAL de la imagen —
# es el diferenciador del SO (seguridad por defecto, no opcional).
#
# RECONCILIADO con el modelo de Vanilla OS 2: Hidralisk usa apx (distrobox/podman
# ROOTLESS) y ABRoot. Por eso se OMITEN a propósito las líneas de HARDENING.md que
# romperían los contenedores sin privilegios (ver bloque "DELIBERADAMENTE OMITIDO").

# ── Memoria / ASLR ────────────────────────────────────────────────────────────
kernel.randomize_va_space = 2          # ASLR completo (stack, heap, mmap, VDSO)
vm.mmap_min_addr = 65536               # no mapear página 0 (NULL-deref exploits)
fs.suid_dumpable = 0                   # sin core dumps de binarios setuid

# ── Ocultar info del kernel ───────────────────────────────────────────────────
kernel.kptr_restrict = 2               # ocultar punteros del kernel (KASLR-leak)
kernel.dmesg_restrict = 1              # dmesg solo root
kernel.perf_event_paranoid = 3         # perf restringido a root
kernel.kexec_load_disabled = 1         # no cargar kernels nuevos en runtime (anti-bootkit en caliente)

# ── ptrace ────────────────────────────────────────────────────────────────────
# scope=1 (no 2 del doc): un proceso solo puede ptracear a sus hijos o con CAP_SYS_PTRACE.
# 1 (no 2) para no romper depuradores ni el attach de distrobox/gdb del usuario.
kernel.yama.ptrace_scope = 1

# ── Protección de filesystem (anti symlink/hardlink races) ───────────────────
fs.protected_hardlinks = 1
fs.protected_symlinks = 1
fs.protected_fifos = 2
fs.protected_regular = 2

# ── Red: anti-spoofing / anti-MITM ───────────────────────────────────────────
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv4.conf.all.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1
net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.icmp_ignore_bogus_error_responses = 1
net.ipv4.tcp_syncookies = 1            # mitiga SYN floods

# ── BPF JIT hardening (sin DESHABILITAR bpf — apx/redes lo usan) ──────────────
net.core.bpf_jit_harden = 2

# ══════════════════════════════════════════════════════════════════════════════
# DELIBERADAMENTE OMITIDO (romperían apx / distrobox / podman rootless en Vanilla):
#   kernel.unprivileged_userns_clone = 0   → apx NECESITA user namespaces sin privilegio
#   kernel.unprivileged_bpf_disabled = 1   → puede romper red/containers rootless
#   kernel.core_pattern = |/bin/false      → interfiere con systemd-coredump
#   kernel.yama.ptrace_scope = 2           → rompe attach de depuradores del usuario
# Si en el futuro Hidralisk deja de depender de apx, se pueden re-evaluar.
# ══════════════════════════════════════════════════════════════════════════════
