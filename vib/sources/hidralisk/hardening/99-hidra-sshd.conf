# Hidralisk OS — sshd endurecido (/etc/ssh/sshd_config.d/99-hidra-sshd.conf)
#
# SSH viene APAGADO por defecto (systemctl enable --now ssh para activarlo — ver
# HARDENING.md). Este drop-in aplica recién cuando el usuario lo enciende: que ese
# sshd ya arranque endurecido, sin checklist posterior.
PermitRootLogin no
MaxAuthTries 4
