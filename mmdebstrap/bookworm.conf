# mmdebstrap configuration: Debian Bookworm minimizado para Hidralisk
#
# Uso:
#   mmdebstrap --customize-hook='chroot "$1" apt-get clean' \
#              --skip=check/empty \
#              bookworm /tmp/base.tar \
#              --config=mmdebstrap/bookworm.conf

[Debootstrap]
Suite = bookworm
Variant = custom
Components = main,contrib,non-free-firmware

Mirror = http://deb.debian.org/debian
Mirror-Merge = true
Extra-Mirrors = http://security.debian.org/debian-security bookworm-security main,contrib,non-free-firmware

[Apt]
Recommended = false
Suggests = false
Clean = true
Update = true
Upgrade = true

[Packages]
# Kernel y boot
linux-image-amd64
linux-headers-amd64
firmware-linux-free
grub-efi-amd64
grub-efi-amd64-bin
grub-common
shim-signed
efibootmgr
systemd
systemd-sysv
dbus

# Filesystem inmutable
ostree
btrfs-progs
btrfsmaintenance
util-linux
e2fsprogs
dosfstools
cryptsetup

# Firmas y verificación
gnupg
gpgv
signify-openbsd
dm-verity
veritysetup
apparmor
apparmor-utils
apparmor-profiles

# Red y base
ca-certificates
curl
wget
openssh-client
openssh-server
nftables
iproute2
iputils-ping
isc-dhcp-client
kmod
udev
console-setup
keyboard-configuration

# Debug mínimo (remover en release)
less
vim-tiny

[Hooks]
Customize = |
  #!/bin/sh
  # Eliminar paquetes innecesarios
  apt-get purge -y --auto-remove \
    apt-listchanges \
    tasksel \
    dictionaries-common \
    iamerican \
    ispell 2>/dev/null || true

  # Limpiar apt
  apt-get clean
  rm -rf /var/lib/apt/lists/*
  rm -rf /var/cache/apt/*

  # Deshabilitar root login con password
  passwd -l root

  # Configurar locale mínimo
  echo "en_US.UTF-8 UTF-8" > /etc/locale.gen
  locale-gen en_US.UTF-8
  echo "LANG=en_US.UTF-8" > /etc/default/locale
